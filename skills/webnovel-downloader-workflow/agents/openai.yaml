  short_description: "Guide AstrBot through candidate-first source selection, probe checks, and precise downloads"
  default_prompt: "Use $webnovel-downloader-workflow to handle source import, async probe refresh and status checks, candidate queries, source inspection, cached search-result paging, and precise novel downloads in AstrBot. Default to novel_query_candidates first, then use novel_download_source_book only after source_id, book_url, book_name, and author are confirmed; use novel_read_search_results when continuing an existing search_id."
